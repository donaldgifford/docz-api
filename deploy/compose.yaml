# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
# Deployment stack for docz-api: the service plus its three stateful
# dependencies (Postgres, Redis, Meilisearch), wired on a private network.
#
# Unlike the repo-root compose.yaml (which runs only the dependencies for local
# `just run`), this brings up the whole service as it would run in a small
# single-host deployment (homelab). It is a reference manifest — adapt the image
# tag, resource limits, and secret sourcing to your environment.
#
# Secrets:
#   - All configuration is read from an env file (env store). Copy
#     .env.production.example -> .env.production and fill it in from your secret
#     manager (SOPS, Vault, 1Password, ...). It is gitignored.
#   - The GitHub App private key is mounted as a file via a Docker secret and
#     referenced by path (GITHUB_APP_PRIVATE_KEY accepts a path or a PEM body).
#
# Usage:
#   cp .env.production.example .env.production      # then fill in real values
#   mkdir -p secrets && cp /path/to/app.pem secrets/github-app.pem
#   docker compose -f deploy/compose.yaml up -d --build
#   docker compose -f deploy/compose.yaml ps
#
# The service auto-applies database migrations on startup, so no separate
# migration step is required. Liveness/readiness are exposed over HTTP at
# /healthz and /readyz; point your orchestrator's probes there (the distroless
# image has no shell, so there is no in-container healthcheck for the service).
---
name: docz-api

services:
  docz-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VERSION: ${DOCZ_API_VERSION:-dev}
        COMMIT: ${DOCZ_API_COMMIT:-none}
        DATE: ${DOCZ_API_DATE:-unknown}
    image: docz-api:${DOCZ_API_TAG:-latest}
    restart: unless-stopped
    # All non-networking config (secrets included) comes from the env store.
    env_file:
      - .env.production
    # Networking is overridden here so the service reaches its dependencies by
    # their compose service names regardless of what the env file says.
    environment:
      DATABASE_URL: postgres://docz:${POSTGRES_PASSWORD:-secret}@postgres:5432/docz_api?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MEILI_HOST: http://meilisearch:7700
      HTTP_ADDR: ":8080"
      # The App private key is delivered as a mounted secret file.
      GITHUB_APP_PRIVATE_KEY: /run/secrets/github_app_key
    secrets:
      - github_app_key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: docz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: docz_api
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docz -d docz_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_API_KEY:-masterKey}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

secrets:
  github_app_key:
    file: ./secrets/github-app.pem

volumes:
  postgres-data: {}
  redis-data: {}
  meili-data: {}
