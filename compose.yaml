# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
# Local development infrastructure for docz-api: Postgres, Redis, Meilisearch.
#
# Not for production. Brings up the three stateful dependencies the service
# needs so `just run` (or `go run ./cmd/docz-api`) can reach them on localhost.
# Hermetic CI tests use testcontainers-go instead (IMPL-0001 OQ 7 / OQ 9).
#
# Usage (just recipes wrap docker compose):
#   just dev-up      # start in the background, wait for health
#   just dev-ps      # check health
#   just dev-down    # stop (dev-nuke to also wipe the volumes)
#
# The credentials below are DEV-ONLY defaults that mirror .env.example; never
# reuse them in a real deployment.
---
name: docz-api-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: docz
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: docz_api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docz -d docz_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Webhook tunnel for local dev against a real GitHub App (profile: tunnel).
  # The service itself runs on the HOST (`just run`), so ngrok targets
  # host.docker.internal:8080. Start with `just dev-tunnel`; requires
  # NGROK_AUTHTOKEN in .env (compose interpolates it from there). For a stable
  # URL across restarts, set NGROK_ARGS=--domain=<your-free-static-domain>.
  ngrok:
    image: ngrok/ngrok:latest
    command: http http://host.docker.internal:8080 --log stdout ${NGROK_ARGS:-}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4040:4040" # ngrok inspection UI + tunnel API
    profiles:
      - tunnel

volumes:
  postgres-data: {}
  redis-data: {}
  meili-data: {}
