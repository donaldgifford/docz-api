{{- if and .Values.tailscale.enabled .Values.tailscale.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "docz-api.fullname" . }}-tailscale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "docz-api.fullname" . }}-tailscale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "docz-api.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "docz-api.fullname" . }}-tailscale
  apiGroup: rbac.authorization.k8s.io
{{- end }}
