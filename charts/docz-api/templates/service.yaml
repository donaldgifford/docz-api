apiVersion: v1
kind: Service
metadata:
  name: {{ include "docz-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "docz-api.selectorLabels" . | nindent 4 }}
    # Scope to the API pods only. The baked backing-service pods (postgres,
    # valkey, meilisearch) carry the same name/instance selector labels and
    # also expose an `http`-named port, so without this component the Service
    # would enroll them as endpoints and round-robin traffic into 404s.
    app.kubernetes.io/component: server
