{{- if and (eq .Values.store.backend "postgres") (eq .Values.store.postgres.mode "baked") -}}
---
# Baked single-pod Postgres for the persistent store. Sized for
# small homelab / dev-cluster footprints; production deployments
# should use store.postgres.mode=cnpg or external.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "docz-api.postgresFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "docz-api.postgresFullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "docz-api.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "docz-api.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.store.postgres.baked.image | quote }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: repoguardian
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.postgresFullname" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.postgresFullname" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- with .Values.store.postgres.baked.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "repoguardian", "-d", "repoguardian"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.store.postgres.baked.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.store.postgres.baked.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "docz-api.postgresFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    {{- include "docz-api.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
