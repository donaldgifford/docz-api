{{- include "docz-api.validateTemplatingVars" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docz-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "docz-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "docz-api.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "docz-api.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.config.port }}
              name: http
              protocol: TCP
            - containerPort: {{ .Values.config.metricsPort }}
              name: metrics
              protocol: TCP
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.secretName" . }}
                  key: app-id
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.secretName" . }}
                  key: webhook-secret
            {{- if .Values.secrets.privateKeyAsFile }}
            - name: GITHUB_PRIVATE_KEY_PATH
              value: /etc/repo-guardian/private-key/private-key.pem
            {{- else }}
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.secretName" . }}
                  key: private-key
            {{- end }}
            - name: LISTEN_ADDR
              value: ":{{ .Values.config.port }}"
            - name: METRICS_ADDR
              value: ":{{ .Values.config.metricsPort }}"
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: DRY_RUN
              value: {{ .Values.config.dryRun | quote }}
            - name: WORKER_COUNT
              value: {{ .Values.config.workerCount | quote }}
            - name: QUEUE_SIZE
              value: {{ .Values.config.queueSize | quote }}
            - name: SCHEDULE_INTERVAL
              value: {{ .Values.config.scheduleInterval | quote }}
            - name: SKIP_FORKS
              value: {{ .Values.config.skipForks | quote }}
            - name: SKIP_ARCHIVED
              value: {{ .Values.config.skipArchived | quote }}
            - name: AUTO_CLOSE_PR
              value: {{ .Values.policy.autoClosePR | quote }}
            - name: TEMPLATE_DIR
              value: /etc/repo-guardian/templates
            - name: WEBHOOK_IP_ALLOWLIST
              value: {{ .Values.webhookIPAllowlist.enabled | quote }}
            {{- if .Values.tailscale.enabled }}
            - name: WEBHOOK_IP_ALLOWLIST_FAIL_OPEN
              value: "true"
            - name: TRUST_PROXY_HEADERS
              value: "true"
            {{- else }}
            - name: WEBHOOK_IP_ALLOWLIST_FAIL_OPEN
              value: {{ .Values.webhookIPAllowlist.failOpen | quote }}
            - name: TRUST_PROXY_HEADERS
              value: {{ .Values.webhookIPAllowlist.trustProxyHeaders | quote }}
            {{- end }}
            {{- if or .Values.policy.config .Values.policy.existingConfigMap }}
            - name: GUARDIAN_CONFIG
              value: /etc/repo-guardian/policy/guardian.hcl
            {{- end }}
            {{- if .Values.templating.strict }}
            - name: STRICT_TEMPLATES
              value: "true"
            {{- end }}
            - name: STORE_BACKEND
              value: {{ .Values.store.backend | quote }}
            - name: QUEUE_BACKEND
              value: {{ .Values.queue.backend | quote }}
            - name: SCHEDULER_BACKEND
              value: {{ .Values.scheduler.backend | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if eq .Values.store.backend "postgres" }}
            - name: STORE_POSTGRES_MAX_CONNS
              value: {{ .Values.store.postgres.maxConns | quote }}
            - name: STORE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.storeSecretName" . }}
                  key: {{ include "docz-api.storeSecretKey" . }}
            - name: RECONCILE_FRESHNESS
              value: {{ .Values.staleSweep.freshness | quote }}
            - name: STALE_SWEEP_BATCH_SIZE
              value: {{ .Values.staleSweep.batchSize | quote }}
            - name: RATE_LIMIT_RESERVE
              value: {{ .Values.staleSweep.rateLimitReserve | quote }}
            {{- end }}
            - name: DISCOVERY_ENABLED
              value: {{ .Values.discovery.enabled | quote }}
            - name: DISCOVERY_INTERVAL
              value: {{ .Values.discovery.interval | quote }}
            - name: DISCOVERY_RESERVE_FRACTION
              value: {{ .Values.discovery.reserveFraction | quote }}
            - name: DISCOVERY_ESTIMATED_COST_PER_REPO
              value: {{ .Values.discovery.estimatedCostPerRepo | quote }}
            {{- if eq .Values.queue.backend "valkey" }}
            - name: QUEUE_VALKEY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.queueSecretName" . }}
                  key: {{ include "docz-api.queueSecretKey" . }}
            - name: JOB_ACK_TIMEOUT
              value: {{ .Values.queue.valkey.jobAckTimeout | quote }}
            - name: REAPER_INTERVAL
              value: {{ .Values.queue.valkey.reaperInterval | quote }}
            {{- end }}
            {{- range $k, $v := .Values.templating.vars }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- if .Values.secrets.privateKeyAsFile }}
            - name: github-private-key
              mountPath: /etc/repo-guardian/private-key
              readOnly: true
            {{- end }}
            - name: templates
              mountPath: /etc/repo-guardian/templates
              readOnly: true
            {{- if or .Values.policy.config .Values.policy.existingConfigMap }}
            - name: policy
              mountPath: /etc/repo-guardian/policy
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.tailscale.enabled }}
        - name: tailscale
          image: {{ .Values.tailscale.image }}
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tailscale.authKeySecret }}
                  key: authkey
            - name: TS_HOSTNAME
              value: {{ .Values.tailscale.hostname | quote }}
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: {{ .Values.tailscale.userspace | quote }}
            - name: TS_SERVE_CONFIG
              value: /config/serve-config.json
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: tailscale-serve-config
              mountPath: /config
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
        {{- end }}
      volumes:
        {{- if .Values.secrets.privateKeyAsFile }}
        - name: github-private-key
          secret:
            secretName: {{ include "docz-api.secretName" . }}
            items:
              - key: private-key
                path: private-key.pem
        {{- end }}
        - name: templates
          configMap:
            name: {{ .Values.templates.existingConfigMap | default (printf "%s-templates" (include "docz-api.fullname" .)) }}
        {{- if or .Values.policy.config .Values.policy.existingConfigMap }}
        - name: policy
          configMap:
            name: {{ .Values.policy.existingConfigMap | default (printf "%s-policy" (include "docz-api.fullname" .)) }}
        {{- end }}
        {{- if .Values.tailscale.enabled }}
        - name: tailscale-state
          emptyDir: {}
        - name: tailscale-serve-config
          configMap:
            name: {{ include "docz-api.fullname" . }}-tailscale-serve-config
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
