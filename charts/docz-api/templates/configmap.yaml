{{- if not .Values.templates.existingConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docz-api.fullname" . }}-templates
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
{{- if .Values.templates.files }}
data:
  {{- range $name, $content := .Values.templates.files }}
  {{ $name }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- else }}
# No template overrides declared. The binary falls back to its
# embedded defaults at runtime when this ConfigMap is empty.
data: {}
{{- end }}
{{- end }}
