{{- if and (eq .Values.store.backend "postgres") (eq .Values.store.postgres.mode "cnpg") .Values.store.postgres.cnpg.pooler.enabled -}}
---
# Optional PgBouncer Pooler CR for the CNPG Cluster. Disabled by
# default; tune via store.postgres.cnpg.pooler.enabled.
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "docz-api.postgresFullname" . }}-pooler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-pooler
spec:
  cluster:
    name: {{ include "docz-api.postgresFullname" . }}
  instances: {{ .Values.store.postgres.cnpg.pooler.instances }}
  type: {{ .Values.store.postgres.cnpg.pooler.type | quote }}

  pgbouncer:
    poolMode: {{ .Values.store.postgres.cnpg.pooler.pgbouncer.poolMode }}
    parameters:
      default_pool_size: {{ .Values.store.postgres.cnpg.pooler.pgbouncer.defaultPoolSize | quote }}
      max_client_conn: {{ .Values.store.postgres.cnpg.pooler.pgbouncer.maxClientConnections | quote }}
      {{- range $key, $value := .Values.store.postgres.cnpg.pooler.pgbouncer.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}

  monitoring:
    enablePodMonitor: {{ .Values.store.postgres.cnpg.pooler.monitoring.enablePodMonitor }}
{{- end }}
