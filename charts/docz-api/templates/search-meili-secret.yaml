{{- if and (eq .Values.search.meili.mode "baked") (not .Values.search.meili.existingSecret) -}}
{{/*
Secret for the baked Meilisearch deployment. The master key is
operator-supplied (search.meili.masterKey), not auto-generated, because
Meilisearch and docz-api must share the exact same value (Meilisearch
consumes it as MEILI_MASTER_KEY; docz-api as MEILI_API_KEY). Skipped when
search.meili.existingSecret points at a pre-existing Secret instead.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docz-api.meiliFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
type: Opaque
stringData:
  MEILI_API_KEY: {{ required "search.meili.masterKey is required when search.meili.mode=baked and search.meili.existingSecret is unset" .Values.search.meili.masterKey | quote }}
{{- end }}
