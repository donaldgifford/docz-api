{{- if eq .Values.search.meili.mode "baked" -}}
{{/*
Secret for the baked Meilisearch deployment. The master key is
operator-supplied (search.meili.masterKey), not auto-generated, because
Meilisearch and docz-api must share the exact same value (Meilisearch
consumes it as MEILI_MASTER_KEY; docz-api as MEILI_API_KEY).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docz-api.meiliFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
type: Opaque
stringData:
  MEILI_API_KEY: {{ required "search.meili.masterKey is required when search.meili.mode=baked" .Values.search.meili.masterKey | quote }}
{{- end }}
