{{- if and (eq .Values.queue.backend "valkey") (eq .Values.queue.valkey.mode "baked") -}}
{{/*
Secret for the baked Valkey deployment. Uses `lookup` to preserve the
existing password across `helm upgrade`.
*/}}
{{- $name := include "docz-api.valkeyFullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $password := "" -}}
{{- if and $existing $existing.data $existing.data.VALKEY_PASSWORD -}}
{{- $password = b64dec $existing.data.VALKEY_PASSWORD -}}
{{- else -}}
{{- $password = randAlphaNum (int .Values.queue.valkey.baked.authPasswordLength) -}}
{{- end -}}
{{- $dsn := printf "redis://:%s@%s.%s.svc.cluster.local:6379/0" $password $name .Release.Namespace -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
type: Opaque
data:
  VALKEY_PASSWORD: {{ $password | b64enc | quote }}
  REDIS_URL: {{ $dsn | b64enc | quote }}
{{- end }}
