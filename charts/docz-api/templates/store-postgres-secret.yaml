{{- if and (eq .Values.store.backend "postgres") (eq .Values.store.postgres.mode "baked") -}}
{{/*
Secret for the baked Postgres deployment. Uses `lookup` to preserve
the existing password across `helm upgrade` so we don't rotate
credentials on every chart deploy.
*/}}
{{- $name := include "docz-api.postgresFullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $user := "doczapi" -}}
{{- $password := "" -}}
{{- if and $existing $existing.data $existing.data.POSTGRES_PASSWORD -}}
{{- $password = b64dec $existing.data.POSTGRES_PASSWORD -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
{{- $dsn := printf "postgres://%s:%s@%s.%s.svc.cluster.local:5432/doczapi?sslmode=disable" $user $password $name .Release.Namespace -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
data:
  POSTGRES_USER: {{ $user | b64enc | quote }}
  POSTGRES_PASSWORD: {{ $password | b64enc | quote }}
  DATABASE_URL: {{ $dsn | b64enc | quote }}
{{- end }}
