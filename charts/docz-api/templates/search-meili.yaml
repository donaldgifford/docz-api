{{- if eq .Values.search.meili.mode "baked" -}}
---
# Baked single-pod Meilisearch for full-text search. Mirrors the baked
# Postgres/Valkey pattern; production deployments can point at an
# external Meilisearch via search.meili.mode=external.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "docz-api.meiliFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  serviceName: {{ include "docz-api.meiliFullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "docz-api.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: meilisearch
  template:
    metadata:
      labels:
        {{- include "docz-api.labels" . | nindent 8 }}
        app.kubernetes.io/component: meilisearch
    spec:
      containers:
        - name: meilisearch
          image: {{ .Values.search.meili.image | quote }}
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "docz-api.meiliFullname" . }}
                  key: MEILI_API_KEY
            - name: MEILI_ENV
              value: production
            - name: MEILI_NO_ANALYTICS
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /meili_data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.search.meili.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.search.meili.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "docz-api.meiliFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "docz-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  clusterIP: None
  ports:
    - port: 7700
      targetPort: http
      name: http
  selector:
    {{- include "docz-api.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
{{- end }}
