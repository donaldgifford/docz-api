# yaml-language-server: $schema=https://json.schemastore.org/helm-testsuite.json
suite: service
templates:
  - templates/service.yaml
tests:
  - it: should create a ClusterIP service by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose a single http port
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1
      - contains:
          path: spec.ports
          content:
            port: 80
            targetPort: http
            protocol: TCP
            name: http

  - it: should use a custom service port when set
    set:
      service:
        port: 8080
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1
      - contains:
          path: spec.ports
          content:
            port: 8080
            targetPort: http
            protocol: TCP
            name: http

  - it: should use selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: docz-api
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should scope the selector to the API pods with component=server
    # Regression guard: without component=server the selector also matches the
    # baked postgres/valkey/meilisearch pods (same name/instance labels + an
    # http-named port), enrolling them as endpoints and 404-ing ~half of traffic.
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: server
