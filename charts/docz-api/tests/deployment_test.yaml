# yaml-language-server: $schema=https://json.schemastore.org/helm-testsuite.json
suite: deployment
templates:
  - templates/deployment.yaml
set:
  config:
    authRedirectBase: "https://docz.example.com"
tests:
  - it: should set replica count
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should default revisionHistoryLimit to 3
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: should override revisionHistoryLimit from values
    set:
      revisionHistoryLimit: 10
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 10

  - it: should use default image tag from appVersion
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/donaldgifford/docz-api:v0.4.0"

  - it: should use custom image tag when set
    set:
      image:
        tag: "v1.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/donaldgifford/docz-api:v1.0.0"

  - it: should expose a single http container port from config.port
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8080
            name: http
            protocol: TCP

  - it: should set liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: should run as the distroless nonroot uid 65532
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 65532

  - it: should harden the container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should mount the private key as a file by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_PRIVATE_KEY
            value: /etc/docz-api/private-key/private-key.pem
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: github-private-key
            mountPath: /etc/docz-api/private-key
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: github-private-key
            secret:
              secretName: RELEASE-NAME-docz-api
              items:
                - key: private-key
                  path: private-key.pem

  - it: should pass the private key via env when privateKeyAsFile is false
    set:
      secrets:
        privateKeyAsFile: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-docz-api
                key: private-key
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: should inject the Tailscale sidecar when enabled
    set:
      tailscale:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: tailscale
      - equal:
          path: spec.template.spec.containers[1].image
          value: "ghcr.io/tailscale/tailscale:latest"

  - it: should not inject the Tailscale sidecar when disabled
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should set resource requests and limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should support extraVolumes and extraVolumeMounts
    set:
      extraVolumes:
        - name: extra-vol
          emptyDir: {}
      extraVolumeMounts:
        - name: extra-vol
          mountPath: /extra
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-vol
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-vol
            mountPath: /extra

  - it: should support nodeSelector
    set:
      nodeSelector:
        kubernetes.io/arch: amd64
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/arch: amd64
