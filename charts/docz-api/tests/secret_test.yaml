# yaml-language-server: $schema=https://json.schemastore.org/helm-testsuite.json
suite: secret
templates:
  - templates/secret.yaml
set:
  config:
    appId: "12345"
  secrets:
    webhookSecret: "whsec"
    privateKey: "pem-body"
    sessionSecret: "sess"
    oauthClientSecret: "oauth"
tests:
  - it: should create secret when secrets.create is true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Secret

  - it: should not create secret when secrets.create is false
    set:
      secrets:
        create: false
        existingSecret: "my-existing-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should carry all five keys
    set:
      config:
        appId: "99999"
      secrets:
        webhookSecret: "super-secret"
        privateKey: "my-pem-key"
        sessionSecret: "session-secret"
        oauthClientSecret: "oauth-secret"
    asserts:
      - equal:
          path: stringData.app-id
          value: "99999"
      - equal:
          path: stringData.webhook-secret
          value: "super-secret"
      - equal:
          path: stringData.session-secret
          value: "session-secret"
      - equal:
          path: stringData.oauth-client-secret
          value: "oauth-secret"
      - isNotNullOrEmpty:
          path: stringData.private-key

  - it: should omit the private key when unset
    set:
      secrets:
        privateKey: ""
    asserts:
      - notExists:
          path: stringData.private-key
