# yaml-language-server: $schema=https://json.schemastore.org/helm-testsuite.json
suite: prometheusrule
templates:
  - templates/prometheusrule.yaml
tests:
  - it: should not create prometheusrule by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create prometheusrule when enabled
    set:
      prometheusRule:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: PrometheusRule
      - equal:
          path: spec.groups[0].name
          value: docz-api.rules

  - it: should include all five docz-api alerts
    set:
      prometheusRule:
        enabled: true
    asserts:
      - contains:
          path: spec.groups[0].rules
          content:
            alert: DoczAPIDown
          any: true
      - contains:
          path: spec.groups[0].rules
          content:
            alert: DoczAPIHighErrorRate
          any: true
      - contains:
          path: spec.groups[0].rules
          content:
            alert: DoczAPISlowRequests
          any: true
      - contains:
          path: spec.groups[0].rules
          content:
            alert: DoczAPIIngestFailures
          any: true
      - contains:
          path: spec.groups[0].rules
          content:
            alert: DoczAPISlowIngest
          any: true

  - it: should mark DoczAPIDown critical
    set:
      prometheusRule:
        enabled: true
    asserts:
      - contains:
          path: spec.groups[0].rules
          content:
            alert: DoczAPIDown
            for: 5m
            labels:
              severity: critical
          any: true

  - it: should not reference repo_guardian metrics
    set:
      prometheusRule:
        enabled: true
    asserts:
      - notMatchRegex:
          path: spec.groups[0].rules[0].expr
          pattern: repo_guardian_

  - it: should set additional labels
    set:
      prometheusRule:
        enabled: true
        labels:
          release: kube-prometheus-stack
    asserts:
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack
