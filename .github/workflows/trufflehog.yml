---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          # Fail only on verified (live) secrets. Unverified/unknown results are
          # dominated by placeholder dev DSNs in .env.example, deploy/compose.yaml
          # and test fixtures (e.g. postgres://docz:secret@localhost) — not real
          # credentials, so scanning verified-only avoids false-positive failures.
          extra_args: --results=verified
