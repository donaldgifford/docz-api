---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docker: ${{ steps.filter.outputs.docker }}
      helm: ${{ steps.filter.outputs.helm }}
      workflows: ${{ steps.filter.outputs.workflows }}
      alerts: ${{ steps.filter.outputs.alerts }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            docker:
              - 'Dockerfile'
              - 'docker-bake.hcl'
              - '.dockerignore'
            helm:
              - 'charts/**'
            workflows:
              - '.github/workflows/**'
            alerts:
              - 'contrib/prometheus/**'

  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Label PR
    steps:
      - name: Checkout code
        uses: actions/labeler@v6

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Set up mise (for just + vacuum)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Lint OpenAPI spec
        run: just lint-openapi

  lint-alerts:
    name: Lint Prometheus Alerts
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.alerts == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up mise (for just + promtool)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Validate Prometheus alert rules
        run: just lint-alerts

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up mise (for just)
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Run unit tests
        run: just test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: donaldgifford/docz-api
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      # cache: false — govulncheck-action does its own setup-go with module
      # caching; letting this step also cache $GOMODCACHE makes the action's
      # tar restore collide with the already-populated cache ("Cannot open:
      # File exists"), failing the job before any scan runs.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run govulncheck
        uses: donaldgifford/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Build snapshot release with SBOMs
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: "~> v2"
          args: release --snapshot --skip=publish --skip=sign --clean

      - name: Locate archive SBOM
        id: sbom
        run: |
          path="$(find dist -name 'docz-api_*_linux_amd64.tar.gz.spdx.json' | head -n1)"
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Scan archive SBOM
        id: scan-sbom
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ steps.sbom.outputs.path }}
          severity-cutoff: high
          fail-build: false
          output-format: sarif

      - name: Upload SBOM scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.5
        with:
          sarif_file: ${{ steps.scan-sbom.outputs.sarif }}
          category: anchore-archive-sbom

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.workflows == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        if: github.event_name == 'pull_request'
        uses: docker/bake-action@v7
        with:
          targets: ci
          source: .
          files: docker-bake.hcl
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.output=type=registry

      - name: Build multi-arch images (post-merge validation)
        if: github.event_name == 'push'
        uses: docker/bake-action@v7
        with:
          targets: ci
          source: .
          files: docker-bake.hcl
          set: |-
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.helm == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install helm-unittest plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest
      - name: Run helm-unittest
        run: helm unittest charts/docz-api

  helm-test:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.helm == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: helm/chart-testing-action@v2
      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml
      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1
      - name: Install and test charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
